# Learning Agent Competition Configuration
# Uses PostgreSQL with pgvector for RAG-based learning

name: "Learning Agent Competition"
description: "Competition featuring learning agents with RAG, pattern matching, and meta-learning"

# Trading configuration
symbols: [BTCUSDT, ETHUSDT, SOLUSDT]
interval_seconds: 300  # 5 minutes between ticks
duration_seconds: null  # Run indefinitely
agent_timeout_seconds: 180  # Learning agents need more time

# Storage configuration
storage:
  backend: postgres  # Requires DATABASE_URL environment variable

# Fee configuration
fees:
  taker_fee: 0.0004      # 0.04% for market orders
  maker_fee: 0.0002      # 0.02% for limit orders
  liquidation_fee: 0.005  # 0.5% liquidation penalty

# Trading constraints
constraints:
  max_leverage: 10
  max_position_pct: 0.25  # Max 25% of equity per position
  starting_capital: 10000

# Historical candles for technical analysis
candles:
  enabled: true
  intervals: ["1h", "15m", "4h"]  # Multiple timeframes for learning
  limit: 200  # More history for pattern detection

# Agents in competition
agents:
  # Primary Learning Agent
  - id: learning_trader_v1
    name: "Learning Trader v1"
    class: agent_arena.agents.learning_trader.LearningTraderAgent
    config:
      model: claude-sonnet-4-20250514
      rag_weight: 0.4
      pattern_weight: 0.3
      meta_weight: 0.3
      max_iterations: 4
      temperature: 0.6
      character: |
        A systematic trader who learns from historical patterns.
        Prioritizes capital preservation while seeking consistent returns.
        Uses all available learning tools before making decisions.

  # Learning Agent with different weights
  - id: learning_trader_rag_focus
    name: "RAG-Focused Learner"
    class: agent_arena.agents.learning_trader.LearningTraderAgent
    config:
      model: claude-sonnet-4-20250514
      rag_weight: 0.6
      pattern_weight: 0.2
      meta_weight: 0.2
      max_iterations: 3
      character: |
        Heavily relies on finding similar historical situations.
        Believes history repeats and past success predicts future success.

  # Baseline: Standard Agentic Claude
  - id: agentic_claude_baseline
    name: "Agentic Claude (Baseline)"
    class: agent_arena.agents.agentic_claude.AgenticClaudeTrader
    config:
      model: claude-sonnet-4-20250514
      max_iterations: 3
      character: |
        Standard agentic trader without learning capabilities.
        Uses technical analysis and risk tools only.

  # Baseline: Simple Claude Trader
  - id: claude_baseline
    name: "Claude Simple (Baseline)"
    class: agent_arena.agents.claude_trader.ClaudeTrader
    config:
      model: claude-sonnet-4-20250514
      character: |
        Simple single-shot trader for comparison.
        No tools, no learning, just market analysis.

  # Baseline: Technical Analysis Trader
  - id: ta_baseline
    name: "TA Bot (Baseline)"
    class: agent_arena.agents.ta_trader.TATrader
    config:
      rsi_oversold: 30
      rsi_overbought: 70
      sma_short: 20
      sma_long: 50

  # Baseline: Index Fund (Buy and Hold)
  - id: index_baseline
    name: "Index Fund (Baseline)"
    class: agent_arena.agents.index_fund.IndexFundAgent
    config:
      rebalance_threshold: 0.1
      target_allocation:
        BTCUSDT: 0.5
        ETHUSDT: 0.3
        SOLUSDT: 0.2
