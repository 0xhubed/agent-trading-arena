# Skill-Aware Agent Competition Configuration
# Uses skills generated by the Observer Agent

name: "Skill-Aware Competition"
description: "Competition featuring agents that use learned skills from past competitions"

# Trading configuration
symbols: [BTCUSDT, ETHUSDT, SOLUSDT]
interval_seconds: 300  # 5 minutes between ticks
duration_seconds: null  # Run indefinitely
agent_timeout_seconds: 180

# Fee configuration
fees:
  taker_fee: 0.0004
  maker_fee: 0.0002
  liquidation_fee: 0.005

# Trading constraints
constraints:
  max_leverage: 10
  max_position_pct: 0.25
  starting_capital: 10000

# Historical candles
candles:
  enabled: true
  intervals: ["1h", "15m"]
  limit: 100

# Agents in competition
agents:
  # Skill-Aware Trader (full toolset + skills)
  - id: skill_aware_v1
    name: "Skill-Aware Trader"
    class: agent_arena.agents.skill_aware_trader.SkillAwareTrader
    config:
      model: claude-sonnet-4-20250514
      max_iterations: 4
      skills_dir: ".claude/skills"
      always_check_skills: true
      character: |
        A disciplined trader who combines learned skills with real-time analysis.
        Always consults historical wisdom before making decisions.
        Respects risk management rules from past competition data.

  # Skill-Only Trader (pure skill-based, no TA tools)
  - id: skill_only_v1
    name: "Skill-Only Trader"
    class: agent_arena.agents.skill_aware_trader.SkillOnlyTrader
    config:
      model: claude-haiku-4-5-20251001  # Cheaper model since simpler reasoning
      max_iterations: 2
      skills_dir: ".claude/skills"
      character: |
        A pure follower of learned wisdom.
        Makes decisions based solely on skill guidance.
        Conservative when skills don't provide clear direction.

  # Baseline: Standard Agentic (no skills)
  - id: agentic_baseline
    name: "Agentic (No Skills)"
    class: agent_arena.agents.agentic_claude.AgenticClaudeTrader
    config:
      model: claude-sonnet-4-20250514
      max_iterations: 3
      character: |
        Standard agentic trader without skill access.
        Uses technical analysis and risk tools only.

  # Baseline: Simple Claude
  - id: claude_baseline
    name: "Claude Simple (No Skills)"
    class: agent_arena.agents.claude_trader.ClaudeTrader
    config:
      model: claude-sonnet-4-20250514
      character: |
        Simple single-shot trader for comparison.
        No tools, no skills, just market analysis.

  # Baseline: TA Bot
  - id: ta_baseline
    name: "TA Bot (No Skills)"
    class: agent_arena.agents.ta_trader.TATrader
    config:
      rsi_oversold: 30
      rsi_overbought: 70
      sma_short: 20
      sma_long: 50

# Observer Agent configuration (runs separately via API)
# POST /api/observer/analyze to trigger analysis
# Skills will be auto-generated in .claude/skills/
