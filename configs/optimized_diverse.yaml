# Optimized Diverse Competition
# Smart mix of models based on agent complexity
# Single 30-min interval for fair comparison

name: "Optimized Diverse Competition"
description: "Strategic model assignment: expensive models for complex agents, cheap for simple"

# 30-min interval balances cost and data collection
symbols: [BTCUSDT, ETHUSDT, SOLUSDT]
interval_seconds: 1800  # 30 minutes (48 ticks/day)
duration_seconds: null
agent_timeout_seconds: 300  # 5 min for complex agents

# Storage
storage:
  backend: postgres

# Fees
fees:
  taker_fee: 0.0004
  maker_fee: 0.0002
  liquidation_fee: 0.005

# Constraints
constraints:
  max_leverage: 10
  max_position_pct: 0.25
  starting_capital: 10000

# Candles
candles:
  enabled: true
  intervals: ["1h", "4h", "15m"]
  limit: 200

agents:
  # ===========================================
  # TIER 1: PREMIUM AGENTS (Complex reasoning)
  # These benefit most from expensive models
  # ===========================================

  # Learning Agent - OPUS 4.5
  # Justification: Most complex agent - RAG, patterns, meta-learning
  # Needs best reasoning to synthesize multiple information sources
  - id: learning_opus
    name: "Learning (Opus)"
    class: agent_arena.agents.learning_trader.LearningTraderAgent
    config:
      model: claude-opus-4-5-20251101
      rag_weight: 0.4
      pattern_weight: 0.3
      meta_weight: 0.3
      max_iterations: 5  # More iterations for complex reasoning
      temperature: 0.5
      character: |
        Elite learning agent with access to historical patterns,
        similar situations, and meta-analysis of top performers.
        Takes time to reason deeply before acting.

  # Agentic Claude - SONNET (good balance)
  # Justification: Multi-step tool use, but structured
  - id: agentic_sonnet
    name: "Agentic Claude (Sonnet)"
    class: agent_arena.agents.agentic_claude.AgenticClaudeTrader
    config:
      model: claude-sonnet-4-20250514
      max_iterations: 4
      character: |
        Methodical trader using technical analysis tools.
        Thinks step by step, validates with multiple indicators.

  # GPT-5.1 Agentic - Premium OpenAI
  # Justification: Compare best-of-breed across providers
  - id: agentic_gpt5
    name: "Agentic GPT-5.1"
    class: agent_arena.agents.agentic_gpt.AgenticGPTTrader
    config:
      model: gpt-5.1
      max_iterations: 4
      character: |
        OpenAI's frontier model with tool use.
        Excellent at following complex instructions.

  # ===========================================
  # TIER 2: MID-TIER AGENTS (Moderate complexity)
  # Good models, reasonable cost
  # ===========================================

  # Skill-Aware - SONNET
  # Justification: Needs to interpret skills + apply them
  - id: skill_aware_sonnet
    name: "Skill-Aware (Sonnet)"
    class: agent_arena.agents.skill_aware_trader.SkillAwareTrader
    config:
      model: claude-sonnet-4-20250514
      max_iterations: 3
      skills_dir: ".claude/skills"
      always_check_skills: true
      character: |
        Combines learned skills with real-time analysis.
        Consults institutional knowledge before trading.

  # DeepSeek V3.1 - Excellent reasoning, affordable
  # Justification: Best open-source reasoning, good for comparison
  - id: deepseek_reasoner
    name: "DeepSeek V3.1"
    class: agent_arena.agents.together_trader.TogetherTrader
    config:
      model: deepseek-v3.1
      character: |
        DeepSeek's advanced reasoning model.
        Known for strong analytical capabilities.

  # Simple GPT-5.1 - Premium single-shot
  # Justification: See how GPT-5.1 does without tools
  - id: gpt5_simple
    name: "GPT-5.1 Simple"
    class: agent_arena.agents.gpt_trader.GPTTrader
    config:
      model: gpt-5.1
      character: |
        Pure reasoning without tools.
        Single-shot decision making.

  # ===========================================
  # TIER 3: BUDGET AGENTS (Simple tasks)
  # Cheap models, high volume baselines
  # ===========================================

  # Skill-Only - HAIKU (just reads skills)
  # Justification: Simple task, doesn't need expensive model
  - id: skill_only_haiku
    name: "Skill-Only (Haiku)"
    class: agent_arena.agents.skill_aware_trader.SkillOnlyTrader
    config:
      model: claude-haiku-4-5-20251001
      max_iterations: 2
      skills_dir: ".claude/skills"
      character: |
        Pure skill follower. No complex analysis.
        Just applies learned rules.

  # GPT-OSS 20B - Very cheap, good baseline
  - id: gpt_oss_20b
    name: "GPT-OSS 20B"
    class: agent_arena.agents.together_trader.TogetherTrader
    config:
      model: gpt-oss-20b
      character: "OpenAI's open-source 20B model"

  # GPT-OSS 120B - Larger open-source
  - id: gpt_oss_120b
    name: "GPT-OSS 120B"
    class: agent_arena.agents.together_trader.TogetherTrader
    config:
      model: gpt-oss-120b
      character: "OpenAI's open-source 120B model"

  # Llama 4 Scout - Fast, cheap
  - id: llama_scout
    name: "Llama 4 Scout"
    class: agent_arena.agents.together_trader.TogetherTrader
    config:
      model: llama-4-scout
      character: "Meta's fast Llama 4 model"

  # Simple Claude Haiku - Cheap baseline
  - id: claude_haiku
    name: "Claude Haiku Simple"
    class: agent_arena.agents.claude_trader.ClaudeTrader
    config:
      model: claude-haiku-4-5-20251001
      character: "Fast, cheap Claude baseline"

  # ===========================================
  # TIER 4: RULE-BASED (Free)
  # ===========================================
  - id: ta_bot
    name: "TA Bot"
    class: agent_arena.agents.ta_trader.TATrader
    config:
      rsi_oversold: 30
      rsi_overbought: 70
      sma_short: 20
      sma_long: 50

  - id: index_fund
    name: "Index Fund"
    class: agent_arena.agents.index_fund.IndexFundAgent
    config:
      rebalance_threshold: 0.1
      target_allocation:
        BTCUSDT: 0.5
        ETHUSDT: 0.3
        SOLUSDT: 0.2

# ===========================================
# COST BREAKDOWN (48 ticks/day at 30-min)
# ===========================================
#
# TIER 1 - Premium (~$0.10-0.20/decision):
#   Learning Opus:    48 × $0.15 = $7.20/day
#   Agentic Sonnet:   48 × $0.06 = $2.88/day
#   Agentic GPT-5.1:  48 × $0.08 = $3.84/day
#
# TIER 2 - Mid (~$0.02-0.05/decision):
#   Skill-Aware:      48 × $0.05 = $2.40/day
#   DeepSeek V3.1:    48 × $0.02 = $0.96/day
#   GPT-5.1 Simple:   48 × $0.04 = $1.92/day
#
# TIER 3 - Budget (~$0.002-0.01/decision):
#   Skill-Only Haiku: 48 × $0.003 = $0.14/day
#   GPT-OSS 20B:      48 × $0.005 = $0.24/day
#   GPT-OSS 120B:     48 × $0.01 = $0.48/day
#   Llama Scout:      48 × $0.008 = $0.38/day
#   Claude Haiku:     48 × $0.003 = $0.14/day
#
# TIER 4 - Free:
#   TA Bot, Index Fund: $0
#
# TOTAL: ~$20-22/day for 13 agents
# ===========================================
