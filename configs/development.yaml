# Agent Arena Development Config
name: "Development Test"

symbols:
  - BTCUSDT
  - ETHUSDT
  - SOLUSDT
  - DOGEUSDT
  - BNBUSDT

interval_seconds: 300  # 5 minutes between ticks
duration_seconds: null  # Run indefinitely
agent_timeout_seconds: 120  # 2 minutes timeout for agent decisions (default: 60)

# Fee configuration (optional - defaults shown)
fees:
  taker_fee: 0.0004      # 0.04% for market orders
  maker_fee: 0.0002      # 0.02% for limit orders
  liquidation_fee: 0.005  # 0.5% liquidation penalty

# Trading constraints (optional - defaults shown)
constraints:
  max_leverage: 10
  max_position_pct: 0.25  # Max 25% of equity per position
  starting_capital: 10000

agents:
  - id: claude_analyst
    name: "The Analyst"
    class: agent_arena.agents.claude_trader.ClaudeTrader
    config:
      model: claude-sonnet-4-5-20250929
      character: "Cautious and analytical. Waits for high-conviction setups. Prefers to hold cash when uncertain."

  - id: gpt_momentum
    name: "The Momentum Trader"
    class: agent_arena.agents.gpt_trader.GPTTrader
    config:
      model: gpt-5.1
      character: "Aggressive trend follower. Rides momentum, uses higher leverage. Quick to enter and exit positions."

  - id: langchain_trader
    name: "The LangChain Trader"
    class: agent_arena.agents.langchain_trader.LangChainTrader
    config:
      model: claude-sonnet-4-5-20250929
      character: "A balanced trader using LangChain for decision-making. Combines technical signals with market sentiment."
      temperature: 0.7

  - id: index_fund
    name: "The Index Fund"
    class: agent_arena.agents.index_fund.IndexFundAgent
    config:
      allocation_per_symbol: 2000
      leverage: 1

  - id: ta_trader
    name: "The Technician"
    class: agent_arena.agents.ta_trader.TATrader
    config:
      rsi_period: 14
      rsi_oversold: 30
      rsi_overbought: 70
      sma_short: 5
      sma_long: 20
      position_size_pct: 0.15
      leverage: 3

  - id: together_reasoner
    name: "The Reasoner"
    class: agent_arena.agents.together_trader.TogetherTrader
    config:
      model: openai/gpt-oss-120b
      character: "Methodical reasoner. Thinks through each trade carefully. Balances risk and reward."
