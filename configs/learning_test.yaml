# Learning Agent - TEST CONFIG
#
# Quick testing configuration with 2-minute ticks.
# Use this to verify everything works before running production config.
#
# Start:  curl -X POST "http://localhost:8000/api/start?config_path=configs/learning_test.yaml"
# Stop:   curl -X POST "http://localhost:8000/api/stop"
# Reset:  curl -X POST "http://localhost:8000/api/reset"

name: "Learning Test (2-min ticks)"
description: "Quick test run - verify agents and learning pipeline work"

symbols: [BTCUSDT, ETHUSDT, SOLUSDT]
interval_seconds: 120  # 2 minutes for fast testing
duration_seconds: null
agent_timeout_seconds: 180

storage:
  backend: postgres

fees:
  taker_fee: 0.0004
  maker_fee: 0.0002
  liquidation_fee: 0.005

constraints:
  max_leverage: 10
  max_position_pct: 0.25
  starting_capital: 10000

candles:
  enabled: true
  intervals: ["15m", "1h"]
  limit: 50  # Less history for faster loading

agents:
  # Minimal agent set for testing

  - id: gpt_momentum
    name: "GPT Momentum"
    class: agent_arena.agents.gpt_trader.GPTTrader
    config:
      model: gpt-4o
      character: "Aggressive momentum trader. Quick decisions, ride trends."

  - id: deepseek_value
    name: "DeepSeek Contrarian"
    class: agent_arena.agents.together_trader.TogetherTrader
    config:
      model: deepseek-ai/DeepSeek-V3
      character: "Contrarian value trader. Buy fear, sell greed."

  - id: claude_systematic
    name: "Claude Systematic"
    class: agent_arena.agents.agentic_claude.AgenticClaudeTrader
    config:
      model: claude-sonnet-4-20250514
      max_iterations: 2  # Fewer iterations for speed
      character: "Systematic trader. Validate before trading."

  - id: ta_systematic
    name: "TA Systematic"
    class: agent_arena.agents.ta_trader.TATrader
    config:
      rsi_oversold: 30
      rsi_overbought: 70

  - id: index_fund
    name: "Index Fund"
    class: agent_arena.agents.index_fund.IndexFundAgent
    config:
      rebalance_threshold: 0.1
      target_allocation:
        BTCUSDT: 0.5
        ETHUSDT: 0.3
        SOLUSDT: 0.2

  - id: rag_learner
    name: "RAG Learner"
    class: agent_arena.agents.learning_trader.LearningTraderAgent
    config:
      model: claude-sonnet-4-20250514
      rag_weight: 0.6
      pattern_weight: 0.25
      meta_weight: 0.15
      max_iterations: 3  # Fewer for speed
      character: "History-focused learner. Trust what worked before."

  - id: meta_learner
    name: "Meta Learner"
    class: agent_arena.agents.learning_trader.LearningTraderAgent
    config:
      model: claude-sonnet-4-20250514
      rag_weight: 0.15
      pattern_weight: 0.25
      meta_weight: 0.6
      max_iterations: 3
      character: "Performance-chaser. Follow whoever is winning."
