# Agent Arena - Lean Diverse Configuration
# Optimized for cost efficiency while maintaining intelligence diversity
#
# Cost breakdown (at 5-min intervals, 288 ticks/day):
#   - Together AI agentic (Learning DeepSeek, Skill-Aware, Skill-Only, Agentic): ~$3.00/day
#   - Together AI simple (GPT-OSS 120B, GPT-OSS 20B, Qwen, Llama): ~$0.36/day
#   - OpenAI (GPT-5.1): ~$1.58/day
#   - Observer (Opus, 1x/day): ~$0.42/day
#   - Free baselines (TA Bot, Index Fund): $0/day
# TOTAL: ~$5.36/day (~$161/month)
# 12 agents total
#
# Previous Anthropic config was ~$26/day (~$780/month) - 85% savings!

name: "Lean Diverse Competition"
description: "Cost-optimized competition with learning agents, skills, and diverse data generators"

# Trading configuration
symbols: [BTCUSDT, ETHUSDT, SOLUSDT, BNBUSDT, DOGEUSDT]  # 5 major futures pairs
interval_seconds: 300  # 5 minutes between ticks (288 ticks/day)
duration_seconds: null  # Run indefinitely
agent_timeout_seconds: 180  # Learning/skill agents need more time

# Fee configuration
fees:
  taker_fee: 0.0004      # 0.04% for market orders
  maker_fee: 0.0002      # 0.02% for limit orders
  liquidation_fee: 0.005  # 0.5% liquidation penalty

# Trading constraints
constraints:
  max_leverage: 10
  max_position_pct: 0.25  # Max 25% of equity per position
  starting_capital: 10000

# Historical candles for technical analysis
candles:
  enabled: true
  intervals: ["1h", "15m", "4h"]
  limit: 200

# Storage configuration (use postgres for learning agent)
storage:
  backend: postgres  # Requires DATABASE_URL environment variable

# ============================================================================
# AGENTS (11 total)
# ============================================================================

agents:
  # --------------------------------------------------------------------------
  # TIER 1: Core Intelligence (Learning & Skills) - ~$0.70/day with Together AI
  # Switched from Anthropic ($23/day) to Together AI for 97% cost reduction
  # --------------------------------------------------------------------------

  # Learning Agent - RAG-based pattern matching (Together AI)
  - id: learning_qwen
    name: "Learning Qwen"
    class: agent_arena.agents.learning_trader_together.LearningTraderTogether
    config:
      model: Qwen/Qwen3-235B-A22B-Instruct-2507-tput  # DeepSeek-V3.1 broken on Together
      rag_weight: 0.4
      pattern_weight: 0.3
      meta_weight: 0.3
      max_iterations: 4
      temperature: 0.6
      character: |
        A systematic trader who learns from historical patterns.
        Retrieves similar past situations via vector search before deciding.
        Prioritizes capital preservation while seeking consistent returns.

  # Skill-Aware Trader - Applies institutional knowledge from Observer (Together AI)
  - id: skill_aware_oss
    name: "Skill-Aware GPT-OSS"
    class: agent_arena.agents.skill_aware_together.SkillAwareTogetherTrader
    config:
      model: gpt-oss-120b  # Better reasoning for skill interpretation
      max_iterations: 4
      skills_dir: ".claude/skills"
      always_check_skills: true
      character: |
        A disciplined trader who combines learned skills with real-time analysis.
        Always consults historical wisdom before making decisions.
        Respects risk management rules from past competition data.

  # Skill-Only Trader - Pure skill-based, cheapest model (Together AI)
  - id: skill_only_oss
    name: "Skill-Only Scout"
    class: agent_arena.agents.skill_aware_together.SkillOnlyTogetherTrader
    config:
      model: gpt-oss-20b  # Cheapest option, sufficient for simple skill reading
      max_iterations: 2
      skills_dir: ".claude/skills"
      character: |
        A pure follower of learned wisdom.
        Makes decisions based solely on skill guidance.
        Conservative when skills don't provide clear direction.
        Tests whether cheap model + good skills can compete.

  # --------------------------------------------------------------------------
  # TIER 2: Proven Performer - ~$1.50-3/day
  # --------------------------------------------------------------------------

  # GPT-5.1 Simple - Best historical performer
  - id: gpt_simple
    name: "GPT-5.1 Simple"
    class: agent_arena.agents.gpt_trader.GPTTrader
    config:
      model: gpt-5.1
      character: |
        Analytical trader with strong market intuition.
        Focuses on price action, funding rates, and momentum.
        Makes decisive moves with clear reasoning.
        Proven performer in past competitions.

  # GPT-OSS 120B Simple - Larger open-source model
  - id: gptoss_120b_simple
    name: "GPT-OSS 120B"
    class: agent_arena.agents.together_trader.TogetherTrader
    config:
      model: openai/gpt-oss-120b
      character: |
        Balanced trader using open-source intelligence.
        Analyzes trends and market structure methodically.
        Moderate risk tolerance with clear entry/exit logic.

  # GPT-OSS 20B Simple - Cheapest baseline
  - id: gptoss_20b_simple
    name: "GPT-OSS 20B"
    class: agent_arena.agents.together_trader.TogetherTrader
    config:
      model: openai/gpt-oss-20b
      character: |
        Fast and efficient trader.
        Quick pattern recognition and decisive action.
        Tests whether smaller models can compete effectively.

  # --------------------------------------------------------------------------
  # TIER 3: Cheap Data Generators (Together AI)
  # --------------------------------------------------------------------------

  # Agentic GPT-OSS - Full tool suite at budget price
  - id: agentic_gptoss
    name: "Agentic GPT-OSS"
    class: agent_arena.agents.agentic_together.AgenticTogetherTrader
    config:
      model: openai/gpt-oss-20b
      max_iterations: 3
      character: |
        Systematic agentic trader using technical analysis tools.
        Makes data-driven decisions with proper position sizing.
        Best value for agentic capabilities.

  # Qwen 3 235B - Large model, diverse perspective
  - id: qwen3_235b
    name: "Qwen 3 235B"
    class: agent_arena.agents.together_trader.TogetherTrader
    config:
      model: Qwen/Qwen3-235B-A22B-Instruct-2507-tput
      character: |
        Methodical trader with broad market perspective.
        Balances technical signals with market sentiment.
        Moderate risk tolerance with diversified positions.

  # Llama 4 Scout - Fast decisions
  - id: llama4_scout
    name: "Llama 4 Scout"
    class: agent_arena.agents.together_trader.TogetherTrader
    config:
      model: meta-llama/Llama-4-Scout-17B-16E-Instruct
      character: |
        Aggressive momentum trader identifying trending markets.
        Uses higher leverage on clear breakouts.
        Quick to cut losses, favors liquid pairs.

  # --------------------------------------------------------------------------
  # TIER 4: Free Baselines - $0/day
  # --------------------------------------------------------------------------

  # TA Bot - Rule-based benchmark
  - id: ta_baseline
    name: "TA Bot"
    class: agent_arena.agents.ta_trader.TATrader
    config:
      rsi_period: 14
      rsi_oversold: 30
      rsi_overbought: 70
      sma_short: 20
      sma_long: 50
      position_size_pct: 0.15
      leverage: 3

  # Index Fund - Buy-and-hold benchmark (20% per symbol across 5 currencies)
  - id: index_fund
    name: "Index Fund"
    class: agent_arena.agents.index_fund.IndexFundAgent
    config:
      allocation_per_symbol: 2000  # $2000 x 5 symbols = $10,000 total
      leverage: 1

# ============================================================================
# OBSERVER AGENT (runs separately, 1x/day)
# Trigger via: POST /api/observer/analyze
# Uses Opus 4.5 for deep pattern analysis (~$0.90/day)
# Skills auto-generated in .claude/skills/
# ============================================================================
