# Development Config - All Agent Types (Cost-Effective)
# Uses cheaper models and longer intervals for testing

name: "Dev All Agents"
description: "Budget-friendly config with all providers (Claude, GPT, Together)"

# Longer intervals = fewer API calls = lower cost
symbols: [BTCUSDT, ETHUSDT]  # Fewer symbols
interval_seconds: 1800  # 30 minutes between ticks (48 ticks/day)
duration_seconds: null
agent_timeout_seconds: 120

# Storage
storage:
  backend: postgres

# Fees
fees:
  taker_fee: 0.0004
  maker_fee: 0.0002
  liquidation_fee: 0.005

# Constraints
constraints:
  max_leverage: 10
  max_position_pct: 0.25
  starting_capital: 10000

# Minimal candles for dev
candles:
  enabled: true
  intervals: ["1h"]
  limit: 50

agents:
  # ===========================================
  # CLAUDE AGENTS (Haiku for cost savings)
  # ===========================================
  - id: learning_claude_dev
    name: "Learning Claude (Dev)"
    class: agent_arena.agents.learning_trader.LearningTraderAgent
    config:
      model: claude-haiku-4-5-20251001  # Cheap
      rag_weight: 0.4
      pattern_weight: 0.3
      meta_weight: 0.3
      max_iterations: 2
      character: "Budget learning agent"

  - id: skill_aware_claude_dev
    name: "Skill-Aware Claude (Dev)"
    class: agent_arena.agents.skill_aware_trader.SkillAwareTrader
    config:
      model: claude-haiku-4-5-20251001
      max_iterations: 2
      skills_dir: "skills"
      always_check_skills: true
      character: "Budget skill-aware agent"

  - id: agentic_claude_dev
    name: "Agentic Claude (Dev)"
    class: agent_arena.agents.agentic_claude.AgenticClaudeTrader
    config:
      model: claude-haiku-4-5-20251001
      max_iterations: 2
      character: "Budget agentic agent"

  # ===========================================
  # GPT AGENTS (GPT-4o-mini for cost savings)
  # ===========================================
  - id: gpt_dev
    name: "GPT-4o-mini (Dev)"
    class: agent_arena.agents.gpt_trader.GPTTrader
    config:
      model: gpt-4o-mini  # Much cheaper than GPT-5.1
      character: "Budget GPT agent"

  # ===========================================
  # TOGETHER AI AGENTS (Already cheap)
  # ===========================================
  - id: gpt_oss_dev
    name: "GPT-OSS 20B (Dev)"
    class: agent_arena.agents.together_trader.TogetherTrader
    config:
      model: gpt-oss-20b  # $0.10/$0.30 - cheap and good
      character: "Budget GPT-OSS"

  - id: deepseek_dev
    name: "DeepSeek V3 (Dev)"
    class: agent_arena.agents.together_trader.TogetherTrader
    config:
      model: deepseek-v3  # Good reasoning, affordable
      character: "Budget DeepSeek"

  - id: llama_dev
    name: "Llama 4 Scout (Dev)"
    class: agent_arena.agents.together_trader.TogetherTrader
    config:
      model: llama-4-scout  # Fast and cheap
      character: "Budget Llama"

  # ===========================================
  # RULE-BASED BASELINES (Free)
  # ===========================================
  - id: ta_bot
    name: "TA Bot"
    class: agent_arena.agents.ta_trader.TATrader
    config:
      rsi_oversold: 30
      rsi_overbought: 70

  - id: index_fund
    name: "Index Fund"
    class: agent_arena.agents.index_fund.IndexFundAgent
    config:
      rebalance_threshold: 0.1
      target_allocation:
        BTCUSDT: 0.6
        ETHUSDT: 0.4

# ===========================================
# COST ESTIMATES (48 ticks/day at 30-min intervals)
# ===========================================
# Claude Haiku: ~$0.002-0.005/decision
# GPT-4o-mini: ~$0.001-0.003/decision
# GPT-OSS-20B: ~$0.003/decision (cheapest Together option)
# DeepSeek V3: ~$0.01/decision
# Llama 4 Scout: ~$0.005/decision
# TA/Index: Free
#
# Estimated total: ~$2-4/day with 9 agents
