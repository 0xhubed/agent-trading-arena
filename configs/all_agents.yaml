# All Agents Competition Configuration
# Runs ALL agent types across ALL providers for comprehensive comparison

name: "All Agents Competition"
description: "Full competition with Claude, GPT, Together AI, Learning, and Skill-aware agents"

# Trading configuration
symbols: [BTCUSDT, ETHUSDT, SOLUSDT]
interval_seconds: 1800  # 30 minutes between ticks (48 ticks/day)
duration_seconds: null  # Run indefinitely
agent_timeout_seconds: 180

# Storage configuration
storage:
  backend: postgres

# Fee configuration
fees:
  taker_fee: 0.0004
  maker_fee: 0.0002
  liquidation_fee: 0.005

# Trading constraints
constraints:
  max_leverage: 10
  max_position_pct: 0.25
  starting_capital: 10000

# Historical candles
candles:
  enabled: true
  intervals: ["1h", "15m", "4h"]
  limit: 200

agents:
  # ===========================================
  # CLAUDE AGENTS (Anthropic)
  # ===========================================
  - id: learning_claude
    name: "Learning Claude"
    class: agent_arena.agents.learning_trader.LearningTraderAgent
    config:
      model: claude-sonnet-4-20250514
      rag_weight: 0.4
      pattern_weight: 0.3
      meta_weight: 0.3
      max_iterations: 4
      character: "Learns from RAG, patterns, and meta-analysis"

  - id: skill_aware_claude
    name: "Skill-Aware Claude"
    class: agent_arena.agents.skill_aware_trader.SkillAwareTrader
    config:
      model: claude-sonnet-4-20250514
      max_iterations: 4
      skills_dir: "skills"
      always_check_skills: true
      character: "Uses Observer-generated skills"

  - id: agentic_claude
    name: "Agentic Claude"
    class: agent_arena.agents.agentic_claude.AgenticClaudeTrader
    config:
      model: claude-sonnet-4-20250514
      max_iterations: 3
      character: "ReAct agent with tools"

  - id: claude_simple
    name: "Claude Simple"
    class: agent_arena.agents.claude_trader.ClaudeTrader
    config:
      model: claude-sonnet-4-20250514
      character: "Pure reasoning, no tools"

  # ===========================================
  # GPT AGENTS (OpenAI)
  # ===========================================
  - id: gpt_simple
    name: "GPT-5.1 Simple"
    class: agent_arena.agents.gpt_trader.GPTTrader
    config:
      model: gpt-5.1
      character: "OpenAI's latest model, pure reasoning"

  - id: agentic_gpt
    name: "Agentic GPT-5.1"
    class: agent_arena.agents.agentic_gpt.AgenticGPTTrader
    config:
      model: gpt-5.1
      max_iterations: 3
      character: "GPT with tools and ReAct loop"

  # ===========================================
  # TOGETHER AI AGENTS (Open Source Models)
  # ===========================================
  - id: gpt_oss_20b
    name: "GPT-OSS 20B"
    class: agent_arena.agents.together_trader.TogetherTrader
    config:
      model: gpt-oss-20b
      character: "OpenAI's open-source 20B model"

  - id: gpt_oss_120b
    name: "GPT-OSS 120B"
    class: agent_arena.agents.together_trader.TogetherTrader
    config:
      model: gpt-oss-120b
      character: "OpenAI's open-source 120B model"

  - id: deepseek_v3
    name: "DeepSeek V3.1"
    class: agent_arena.agents.together_trader.TogetherTrader
    config:
      model: deepseek-v3.1
      character: "DeepSeek's latest reasoning model"

  - id: llama_scout
    name: "Llama 4 Scout"
    class: agent_arena.agents.together_trader.TogetherTrader
    config:
      model: llama-4-scout
      character: "Meta's fast Llama 4 model"

  - id: agentic_together
    name: "Agentic GPT-OSS"
    class: agent_arena.agents.agentic_together.AgenticTogetherTrader
    config:
      model: gpt-oss-20b
      max_iterations: 3
      character: "GPT-OSS with tools"

  # ===========================================
  # RULE-BASED BASELINES (Free)
  # ===========================================
  - id: ta_bot
    name: "TA Bot"
    class: agent_arena.agents.ta_trader.TATrader
    config:
      rsi_oversold: 30
      rsi_overbought: 70
      sma_short: 20
      sma_long: 50

  - id: index_fund
    name: "Index Fund"
    class: agent_arena.agents.index_fund.IndexFundAgent
    config:
      rebalance_threshold: 0.1
      target_allocation:
        BTCUSDT: 0.5
        ETHUSDT: 0.3
        SOLUSDT: 0.2

# ===========================================
# COST ESTIMATES (48 ticks/day at 30-min intervals)
# ===========================================
# Claude Sonnet: ~$0.04-0.08/decision
# GPT-5.1: ~$0.03-0.06/decision
# GPT-OSS-20B: ~$0.005/decision ($0.10/$0.30 per 1M tokens)
# GPT-OSS-120B: ~$0.01/decision ($0.15/$0.60 per 1M tokens)
# DeepSeek V3.1: ~$0.02/decision ($1.25/$1.25 per 1M tokens)
# Llama 4 Scout: ~$0.01/decision ($0.18/$0.59 per 1M tokens)
# TA/Index: Free
#
# Estimated total: ~$15-25/day with 13 agents (6x cheaper than 5-min)
