# Agent Arena - Agentic Traders Config
# Uses LangGraph for ReAct-style reasoning with tools

name: "Agentic Trading Competition"

symbols:
  - BTCUSDT
  - ETHUSDT
  - SOLUSDT

interval_seconds: 300  # 5 minutes between ticks
duration_seconds: null  # Run indefinitely

agents:
  # Agentic Claude - Full tool suite with persistent memory
  - id: agentic_claude
    name: "Agentic Claude"
    class: agent_arena.agents.agentic_claude.AgenticClaudeTrader
    config:
      model: claude-haiku-4-5-20251001  # Haiku for agentic (tools assist reasoning)
      max_iterations: 3
      temperature: 0.7
      character: >
        A methodical agentic trader that systematically analyzes markets using
        technical indicators, risk calculations, and sentiment data. Patient and
        disciplined, waiting for high-conviction setups with favorable risk/reward.

  # Agentic GPT-OSS - Strong tool calling, can run locally
  - id: agentic_gpt
    name: "Agentic GPT-OSS"
    class: agent_arena.agents.agentic_together.AgenticTogetherTrader
    config:
      model: openai/gpt-oss-20b  # $0.05/$0.20 - can run locally, good tools
      max_iterations: 3
      character: >
        Data-driven agentic trader that leverages multiple indicators before making
        decisions. Combines technical analysis with market sentiment. Balances
        aggressive opportunities with proper risk management.

  # Baseline: Simple Claude trader (non-agentic)
  - id: simple_claude
    name: "Simple Claude"
    class: agent_arena.agents.claude_trader.ClaudeTrader
    config:
      model: claude-sonnet-4-5-20250929  # Sonnet 4.5 - better reasoning without tools
      character: "Quick decision maker. Relies on market intuition and price action."

  # Baseline: Technical Analysis (rule-based, no API cost)
  - id: ta_baseline
    name: "TA Baseline"
    class: agent_arena.agents.ta_trader.TATrader
    config:
      rsi_period: 14
      rsi_oversold: 30
      rsi_overbought: 70
      sma_short: 5
      sma_long: 20
      position_size_pct: 0.15
      leverage: 3

  # Baseline: Index Fund (passive, no API cost)
  - id: index_baseline
    name: "Index Fund"
    class: agent_arena.agents.index_fund.IndexFundAgent
    config:
      allocation_per_symbol: 3000
      leverage: 1
